<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="url(#fg)" stroke-width="1.5" opacity="0.4"/>
  <!-- Network lines -->
  <line x1="16" y1="4" x2="26" y2="22" stroke="url(#fg)" stroke-width="1" opacity="0.4"/>
  <line x1="26" y1="22" x2="6" y2="22" stroke="url(#fg)" stroke-width="1" opacity="0.4"/>
  <line x1="6" y1="22" x2="16" y2="4" stroke="url(#fg)" stroke-width="1" opacity="0.4"/>
  <line x1="16" y1="4" x2="16" y2="16" stroke="url(#fg)" stroke-width="1" opacity="0.3"/>
  <line x1="6" y1="22" x2="16" y2="16" stroke="url(#fg)" stroke-width="1" opacity="0.3"/>
  <line x1="26" y1="22" x2="16" y2="16" stroke="url(#fg)" stroke-width="1" opacity="0.3"/>
  <!-- Nodes -->
  <circle cx="16" cy="4" r="3" fill="#3b82f6"/>
  <circle cx="26" cy="22" r="3" fill="#22c55e"/>
  <circle cx="6" cy="22" r="3" fill="#f59e0b"/>
  <!-- Center hub -->
  <circle cx="16" cy="16" r="3.5" fill="url(#fg)"/>
</svg>

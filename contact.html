<body>
  <div class="page-wrapper">
    <div class="page-content">

      <section class="hero-section">
        <h1>Get In Touch</h1>
        <p class="hero-subtitle">Questions, feedback, or partnership inquiries — we'd love to hear from you.</p>
      </section>

      <div class="content-card">
        <form id="contact-form" class="contact-form" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" placeholder="Your name" required />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="you@example.com" required />
            </div>
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="What's this about?" />
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Tell us what's on your mind..." required></textarea>
          </div>
          <button type="submit" class="btn-primary submit-btn">Send Message</button>
          <div id="form-status" class="form-status"></div>
        </form>
      </div>

      <footer class="page-footer">
        <p>&copy; 2026 Supply Chain Disaster. Built to teach supply chain strategy through play. &nbsp;&middot;&nbsp; <a href="/rss.xml" title="RSS Feed">RSS Feed</a></p>
      </footer>

    </div>
  </div>

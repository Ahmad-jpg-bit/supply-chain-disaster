      },

        "name": "How do port strikes affect supply chains?",
        "acceptedAnswer": { "@type": "Answer", "text": "Port strikes can add 14–20 days to lead times as vessels queue, divert to alternative ports, or wait for strike resolution. They also trigger emergency rerouting costs and demurrage charges. Major port strikes at Hamburg, Antwerp, or US East Coast have historically caused widespread supply chain disruption lasting weeks to months." }
      },
      {
        "@type": "Question",
        "name": "How do you calculate safety stock?",
        "acceptedAnswer": { "@type": "Answer", "text": "Safety Stock = Z-score × Standard Deviation of Lead Time Demand. For a 95% service level, Z = 1.65. For a 99% service level, Z = 2.33. Example: Average daily demand = 100 units, lead time standard deviation = 3 days, average lead time = 10 days → Safety Stock = 1.65 × 3 × 100 ÷ √10 ≈ 157 units. Reorder Point = (Average Daily Demand × Lead Time) + Safety Stock. Higher service level targets require significantly more safety stock — moving from 95% to 99% service level typically increases safety stock by 40%." }
      },
      {
        "@type": "Question",
        "name": "How do you calculate the reorder point?",
        "acceptedAnswer": { "@type": "Answer", "text": "Reorder Point (ROP) = (Average Daily Demand × Lead Time in Days) + Safety Stock. Example: Average daily demand = 50 units, lead time = 14 days, safety stock = 100 units → ROP = (50 × 14) + 100 = 800 units. When inventory drops to 800 units, place the next purchase order. With disruption-extended lead times (e.g., Red Sea rerouting adding 14 days), the ROP increases to (50 × 28) + 100 = 1,500 units — nearly double." }
      }
    ]
